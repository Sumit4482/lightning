[build]
  base = "frontend"
  publish = "dist/lightning/browser"
  command = "npm run build:netlify"

[build.environment]
  NODE_VERSION = "18"
  # Set API_URL in Netlify UI → Site settings → Environment variables
  # Example: https://lightning-api.onrender.com

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable" 